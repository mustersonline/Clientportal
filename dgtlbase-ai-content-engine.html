  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Noise texture */
  .noise::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.15); }
  }
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes check-in {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .fade-up { animation: fadeUp 0.5s ease-out forwards; }
  .pulse-dot { animation: pulse-dot 1.5s infinite; }
  .shimmer {
    background: linear-gradient(90deg, #eadfd0 0%, #f5ece0 40%, #eadfd0 80%);
    background-size: 800px 100%;
    animation: shimmer 1.8s infinite linear;
  }
  .spin-slow { animation: spin-slow 2s linear infinite; }
  .check-in { animation: check-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(10,10,10,0.15); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(10,10,10,0.3); }

  /* Input styling */
  input, select, textarea {
    font-family: 'Geist', sans-serif;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #ff5b2e;
    box-shadow: 0 0 0 3px rgba(255, 91, 46, 0.12);
  }

  /* Button transitions */
  button { transition: all 0.2s ease; }

  /* Editable fields */
  [contenteditable]:focus {
    outline: none;
    background: rgba(255, 91, 46, 0.04);
    border-radius: 4px;
  }
  [contenteditable]:hover {
    background: rgba(0,0,0,0.02);
    border-radius: 4px;
  }

  /* Tab underline animation */
  .tab-active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: #0a0a0a;
  }

  /* Toast */
  .toast-in {
    animation: fadeUp 0.3s ease-out forwards;
  }

  /* Dot pattern background */
  .dots {
    background-image: radial-gradient(circle, rgba(10,10,10,0.1) 1px, transparent 1px);

    background-clip: text;

function toast(message, icon = '✓') {
  const el = document.createElement('div');
  el.className = 'toast-in bg-ink text-cream px-5 py-3.5 rounded-lg shadow-xl flex items-center gap-3 min-w-[280px] border border-ink';
  el.innerHTML = `
    <div class="w-6 h-6 rounded-full bg-accent flex items-center justify-center text-white text-sm font-medium">${icon}</div>
    <div class="text-sm font-medium">${message}</div>
  `;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => {
    el.style.transition = 'all 0.3s ease';
    el.style.opacity = '0';
    el.style.transform = 'translateY(-8px)';
    setTimeout(() => el.remove(), 300);
  }, 2800);
}

function render() {
  const app = document.getElementById('app');
  switch (state.page) {
    case 'login': app.innerHTML = renderLogin(); break;
    case 'dashboard': app.innerHTML = renderDashboard(); break;
    case 'generator': app.innerHTML = renderGenerator(); break;
    case 'progress': app.innerHTML = renderProgress(); runProgressAnimation(); break;
    case 'result': app.innerHTML = renderResult(); break;
    case 'history': app.innerHTML = renderHistory(); break;
    case 'settings': app.innerHTML = renderSettings(); break;
    default: app.innerHTML = renderDashboard();
  }
  window.scrollTo(0, 0);
}

  setState({ page });
}

function quickGenerate() {
  const input = document.getElementById('quick-keyword');
  const keyword = input ? input.value : '';
  if (!keyword.trim()) {
    toast('Vul een keyword in', '!');
    return;
  }
  state.formData.keyword = keyword;
  state.page = 'generator';
  render();
}

function startGeneration() {
  const keyword = document.getElementById('gen-keyword')?.value || '';
  const market = document.getElementById('gen-market')?.value || 'NL';
  const industry = document.getElementById('gen-industry')?.value || 'E-commerce';
  const context = document.getElementById('gen-context')?.value || '';

  if (!keyword.trim()) {
    toast('Vul een keyword in', '!');
    return;
  }

  state.formData = { keyword, market, industry, context };
  const cost = state.selectedJobType === 'briefing' ? 1 : state.selectedJobType === 'article' ? 2 : 3;
  userCredits -= cost;

  setState({ page: 'progress' });
}

function runProgressAnimation() {
  const steps = [0, 1, 2, 3];
  const timings = [1200, 2300, 3400, 4600];

  steps.forEach((step, i) => {
    if (i === 0) return; // Already active
    setTimeout(() => {
      const prevStep = document.getElementById(`step-${i - 1}`);
      const prevIcon = document.getElementById(`step-icon-${i - 1}`);
      const prevTime = document.getElementById(`step-time-${i - 1}`);
      const curStep = document.getElementById(`step-${i}`);
      const curIcon = document.getElementById(`step-icon-${i}`);

      if (prevStep) {
        prevStep.classList.remove('bg-accent/5', 'border-accent/20');
        prevStep.classList.add('opacity-90');
      }
      if (prevIcon) {
        prevIcon.innerHTML = `<div class="check-in w-8 h-8 rounded-full bg-moss text-white flex items-center justify-center">${icon.check}</div>`;
      }
      if (prevTime) {
        prevTime.textContent = `${(timings[i-1] / 1000).toFixed(1)}s`;
      }
      if (curStep) {
        curStep.classList.remove('opacity-30');
        curStep.classList.add('bg-accent/5', 'border', 'border-accent/20');
      }
      if (curIcon) {
        curIcon.innerHTML = `<div class="w-5 h-5 border-2 border-accent border-t-transparent rounded-full spin-slow"></div>`;
      }
    }, timings[i - 1]);
  });

  // Final completion
  setTimeout(() => {
    const finalIdx = 3;
    const finalIcon = document.getElementById(`step-icon-${finalIdx}`);
    const finalTime = document.getElementById(`step-time-${finalIdx}`);
    const finalStep = document.getElementById(`step-${finalIdx}`);

    if (finalIcon) {
      finalIcon.innerHTML = `<div class="check-in w-8 h-8 rounded-full bg-moss text-white flex items-center justify-center">${icon.check}</div>`;
    }
    if (finalTime) finalTime.textContent = '5.8s';
    if (finalStep) {
      finalStep.classList.remove('bg-accent/5', 'border-accent/20');
    }

    setTimeout(() => {
      state.currentResult = generateMockContent(state.formData.keyword, state.formData.market, state.formData.industry);
      state.currentTab = 'briefing';
      setState({ page: 'result' });
      toast('Generatie voltooid!');
    }, 700);
  }, 5800);
}

function viewJob(jobId) {
  const job = mockJobs.find(j => j.id === jobId);
  if (!job) return;
  state.formData = {
    keyword: job.keyword,
    market: markets.find(m => m.label === job.market)?.value || 'NL',
    industry: job.industry,
    context: '',
  };
  state.currentResult = generateMockContent(job.keyword, job.market, job.industry);
  state.currentTab = 'briefing';
  setState({ page: 'result' });
}

function confirmRegenerate() {
  if (confirm('Opnieuw genereren kost weer credits. Doorgaan?')) {
    userCredits -= 3;
    setState({ page: 'progress' });
  }
}

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
